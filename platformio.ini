; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = src           ; All source files live in the src/ directory
description = Relay controller for ESP32

[env]
#platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = jandrassy/TelnetStream@^1.3.0

[env:esp32dev]
monitor_speed = 115200
upload_speed  = 921600

; --- OTA Configuration ---
[env:esp32dev_OTA]
upload_protocol = espota
upload_port = esp32_relayboard.local
monitor_port = socket://esp32_relayboard.local:23